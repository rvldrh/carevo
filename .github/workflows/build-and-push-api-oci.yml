name: Build and Push Carevo API OCI Image to GHCR

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/api/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/carevo__api
      APP_PATH: apps/api

    steps:
      # ---- Checkout repo ----
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- Get app version ---
      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./apps/api/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ---- Login to GHCR ----
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- Setup Docker Buildx ----
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- Build & Push ----
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.APP_PATH }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Verify ----
      - name: Verify image
        run: |
          docker pull ${{ env.IMAGE_NAME }}:latest
          docker image inspect ${{ env.IMAGE_NAME }}:latest
